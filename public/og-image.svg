<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="100%" stop-color="#11161f"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Dot grid pattern -->
  <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#1e2530" opacity="0.8"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)" opacity="0.6"/>

  <!-- Top accent glow -->
  <rect x="0" y="0" width="1200" height="320" fill="url(#glowGrad)"/>

  <!-- Left accent bar -->
  <rect x="72" y="160" width="4" height="100" rx="2" fill="url(#accentGrad)" filter="url(#glow)"/>

  <!-- Brand tag top-left -->
  <text x="72" y="118" font-family="'Space Grotesk', ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="600" letter-spacing="0.08em" fill="#2dd4bf" opacity="0.9">datawithanas</text>

  <!-- Name -->
  <text x="92" y="232" font-family="'Space Grotesk', ui-sans-serif, system-ui, sans-serif" font-size="76" font-weight="700" letter-spacing="-0.02em" fill="#e6edf3">Muhammad Anas</text>

  <!-- Title with gradient simulation -->
  <text x="94" y="298" font-family="'Space Grotesk', ui-sans-serif, system-ui, sans-serif" font-size="32" font-weight="500" letter-spacing="0.01em" fill="#2dd4bf">Data Scientist &amp; Analyst</text>

  <!-- Divider line -->
  <rect x="72" y="338" width="480" height="1" fill="#1e2530"/>

  <!-- Pitch text -->
  <text x="72" y="378" font-family="'Inter', ui-sans-serif, system-ui, sans-serif" font-size="20" fill="#9aa7b4" font-weight="400">
    <tspan x="72" dy="0">Turning raw data into production pipelines, predictive models,</tspan>
    <tspan x="72" dy="32">and decisions stakeholders can act on.</tspan>
  </text>

  <!-- Tags -->
  <!-- Python -->
  <rect x="72" y="472" width="106" height="38" rx="8" fill="#161c27" stroke="#1e2530" stroke-width="1"/>
  <text x="125" y="496" font-family="'Inter', ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#9aa7b4" text-anchor="middle">Python</text>

  <!-- Machine Learning -->
  <rect x="192" y="472" width="170" height="38" rx="8" fill="#161c27" stroke="#1e2530" stroke-width="1"/>
  <text x="277" y="496" font-family="'Inter', ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#9aa7b4" text-anchor="middle">Machine Learning</text>

  <!-- SQL -->
  <rect x="376" y="472" width="76" height="38" rx="8" fill="#161c27" stroke="#1e2530" stroke-width="1"/>
  <text x="414" y="496" font-family="'Inter', ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#9aa7b4" text-anchor="middle">SQL</text>

  <!-- Tableau -->
  <rect x="466" y="472" width="108" height="38" rx="8" fill="#161c27" stroke="#1e2530" stroke-width="1"/>
  <text x="520" y="496" font-family="'Inter', ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#9aa7b4" text-anchor="middle">Tableau</text>

  <!-- AWS -->
  <rect x="588" y="472" width="80" height="38" rx="8" fill="#161c27" stroke="#1e2530" stroke-width="1"/>
  <text x="628" y="496" font-family="'Inter', ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#9aa7b4" text-anchor="middle">AWS</text>

  <!-- Right side — stat cards -->
  <!-- Card 1 -->
  <rect x="820" y="160" width="310" height="120" rx="14" fill="#11161f" stroke="#1e2530" stroke-width="1"/>
  <text x="875" y="220" font-family="'Space Grotesk', ui-sans-serif, system-ui, sans-serif" font-size="46" font-weight="700" fill="#2dd4bf">5+</text>
  <text x="875" y="252" font-family="'Inter', ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#7a8693">Years of experience</text>

  <!-- Card 2 -->
  <rect x="820" y="302" width="310" height="120" rx="14" fill="#11161f" stroke="#1e2530" stroke-width="1"/>
  <text x="875" y="362" font-family="'Space Grotesk', ui-sans-serif, system-ui, sans-serif" font-size="46" font-weight="700" fill="#38bdf8">3×</text>
  <text x="875" y="394" font-family="'Inter', ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#7a8693">Promotions in 26 months</text>

  <!-- Card 3 -->
  <rect x="820" y="444" width="310" height="120" rx="14" fill="#11161f" stroke="#1e2530" stroke-width="1"/>
  <text x="875" y="504" font-family="'Space Grotesk', ui-sans-serif, system-ui, sans-serif" font-size="46" font-weight="700" fill="#2dd4bf">99.9%</text>
  <text x="875" y="536" font-family="'Inter', ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#7a8693">Infrastructure uptime</text>

  <!-- Bottom border accent -->
  <rect x="0" y="622" width="1200" height="8" rx="0" fill="url(#accentGrad)"/>
</svg>
